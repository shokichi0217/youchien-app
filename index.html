<!DOCTYPE html>
<html>
<head>
  <base href="/youchien-app/">

  <meta charset="UTF-8">
  <script>
    // 1. 古いService Workerをすべて強制アンインストール
    if ('serviceWorker' in navigator) {
      navigator.serviceWorker.getRegistrations().then(function(registrations) {
        for (let registration of registrations) {
          registration.unregister().then(function() {
            console.log('Old Service Worker successfully unregistered.');
          });
        }
      });
    }

    // 2. Service Workerが作成した強力なキャッシュ(Cache Storage)を全削除
    if ('caches' in window) {
      caches.keys().then(function(keyList) {
        return Promise.all(keyList.map(function(key) {
          console.log('Deleting cache: ' + key);
          return caches.delete(key);
        }));
      });
    }
  </script>
  <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
  <meta http-equiv="Pragma" content="no-cache">
  <meta http-equiv="Expires" content="0">
  <meta content="IE=Edge" http-equiv="X-UA-Compatible">
  <meta name="description" content="A new Flutter project.">

  <!-- iOS meta tags & icons -->
  <meta name="mobile-web-app-capable" content="yes">

  <meta name="apple-mobile-web-app-title" content="gemini_ocr_app">
  <link rel="apple-touch-icon" href="icons/Icon-192.png">

  <!-- Favicon -->
  <link rel="icon" type="image/png" href="favicon.png"/>

  <title>gemini_ocr_app</title>
  <link rel="manifest" href="manifest.json">
  <style>
    /* Ensure the cropper container has a defined height */
    .cropper-container {
      height: 100%;
      width: 100%;
    }
    /* Expand touch/click hit area of cropper lines & points */
    .cropper-point {
      position: absolute;
      display: block;
      opacity: 0.75;
    }
    .cropper-point::before {
      content: '';
      position: absolute;
      top: -16px;
      left: -16px;
      right: -16px;
      bottom: -16px;
      background: transparent;
      z-index: 10;
    }
    .cropper-line {
      position: absolute;
      display: block;
      width: 100%;
      height: 100%;
      opacity: 0.1;
    }
    .cropper-line::before {
      content: '';
      position: absolute;
      top: -12px;
      left: -12px;
      right: -12px;
      bottom: -12px;
      background: transparent;
      z-index: 10;
    }
  </style>
  <link href="https://cdnjs.cloudflare.com/ajax/libs/cropperjs/1.5.13/cropper.min.css" rel="stylesheet">
  <script src="https://cdnjs.cloudflare.com/ajax/libs/cropperjs/1.5.13/cropper.min.js"></script>
</head>
